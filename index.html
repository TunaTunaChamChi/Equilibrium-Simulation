<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동적 화학 평형 시뮬레이션 (PAIR-C)</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #1e1e2f; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #00d2ff; }
        .container { display: flex; gap: 20px; width: 100%; max-width: 1000px; flex-wrap: wrap; }
        
        /* 분할 화면 */
        .micro-view, .macro-view { background: #2a2a40; padding: 20px; border-radius: 10px; flex: 1; min-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        canvas { background: #111; border-radius: 5px; width: 100%; height: 300px; border: 1px solid #444; }
        
        .controls { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .control-group { display: flex; justify-content: space-between; align-items: center; background: #33334d; padding: 10px; border-radius: 5px; }
        button { background: #00d2ff; border: none; padding: 8px 15px; color: #000; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0099cc; }
        button.active { background: #ffcc00; color: #000; }
        
        /* 표 스타일 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #33334d; border-radius: 5px; overflow: hidden; }
        th, td { padding: 12px; text-align: center; border: 1px solid #444; font-size: 1.1em; }
        th { background: #222233; color: #fff; }
        
        /* 거시적 색상 박스 */
        .macro-color-box {
            width: 100%;
            height: 120px;
            background-color: rgb(255, 255, 255); /* 기본 투명(흰색 배경) */
            border-radius: 8px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
            transition: background-color 0.1s;
        }
        .macro-color-text {
            color: #222;
            font-weight: 900;
            font-size: 1.2em;
            text-shadow: 0px 0px 5px rgba(255,255,255,0.8);
        }

        /* 반응 속도 벡터 */
        .vector-container { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; font-weight: bold; }
        .bar-wrapper { flex: 1; background: #444; height: 20px; border-radius: 10px; overflow: hidden; position: relative; }
        .bar-forward { background: #ff4757; height: 100%; width: 0%; float: left; transition: width 0.1s; }
        .bar-reverse { background: #a4b0be; height: 100%; width: 0%; float: right; transition: width 0.1s; }
        
        /* 순반응 벡터 (화살표) */
        .vector-sum-wrapper { flex: 1; height: 20px; background: #333; border-radius: 10px; position: relative; display: flex; max-width: calc(100% - 140px); margin: 0 auto; }
        .vector-sum-bar { position: absolute; height: 100%; top: 0; transition: width 0.1s, left 0.1s; border-radius: 5px; }
        
        /* 화살표 CSS 드로잉 */
        .vector-sum-bar.arrow-right::after {
            content: ""; position: absolute; right: -10px; top: 0;
            border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-left: 10px solid #ff4757;
        }
        .vector-sum-bar.arrow-left::before {
            content: ""; position: absolute; left: -10px; top: 0;
            border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-right: 10px solid #a4b0be;
        }
    </style>
</head>
<body>

    <h1>화학 평형 시뮬레이션 ($A \rightleftharpoons B$)</h1>
    
    <div class="container">
        <!-- 미시적 관점 (Micro) -->
        <div class="micro-view">
            <h3>미시적 입자 운동 (Microscopic)</h3>
            <canvas id="simCanvas"></canvas>
            
            <div class="controls">
                <div class="control-group">
                    <label>단일 입자 추적 (A 차원)</label>
                    <button id="trackBtn">추적 켜기</button>
                </div>
                <div class="control-group">
                    <label>온도 조절 (R 차원: 흡열 반응 가정)</label>
                    <input type="range" id="tempSlider" min="20" max="100" value="50">
                    <span id="tempValue">50</span>
                </div>
            </div>
        </div>

        <!-- 거시적 관점 (Macro) -->
        <div class="macro-view">
            <h3>거시적 상태 및 반응 속도 (Macroscopic)</h3>
            
            <!-- 물리적 고증을 거친 거시적 색상 시각화 -->
            <div style="display:flex; flex-direction: column; align-items: center; margin-bottom: 15px;">
                <div id="macroColorBox" class="macro-color-box">
                    <span class="macro-color-text">거시적 용액 색상</span>
                </div>
                <div style="font-size: 0.8em; color: #aaa;">* 비어-람베르트 법칙(Beer-Lambert Law) 적용</div>
            </div>

            <!-- 반응물/생성물 개수 표 -->
            <table>
                <tr>
                    <th style="width: 20%;">구분</th>
                    <th style="width: 40%; color: #ff4757;">반응물 A (붉은색)</th>
                    <th style="width: 40%; color: #a4b0be;">생성물 B (투명)</th>
                </tr>
                <tr>
                    <td style="font-weight: bold;">개수</td>
                    <td id="countATable" style="font-weight: bold; color: #ff4757;">0</td>
                    <td id="countBTable" style="font-weight: bold; color: #a4b0be;">0</td>
                </tr>
            </table>

            <h4 style="margin-top:25px; margin-bottom: 5px;">반응 속도 (C 차원)</h4>
            
            <!-- 개별 반응 속도 벡터 -->
            <div class="vector-container">
                <span style="width: 60px; text-align: right;">역반응</span>
                <div class="bar-wrapper">
                    <div id="vectorReverse" class="bar-reverse"></div>
                </div>
                <div style="width: 2px; height: 30px; background: #fff;"></div> <!-- 평형 기준선 -->
                <div class="bar-wrapper">
                    <div id="vectorForward" class="bar-forward"></div>
                </div>
                <span style="width: 60px;">정반응</span>
            </div>

            <!-- 순반응(벡터 합) 화살표 -->
            <div class="vector-container" style="margin-top: 5px;">
                <span style="width: 60px;"></span>
                <div class="vector-sum-wrapper">
                    <div style="position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #fff; z-index: 10; transform: translateX(-50%);"></div>
                    <div id="vectorSumBar" class="vector-sum-bar"></div>
                </div>
                <span style="width: 60px;"></span>
            </div>
            
            <div id="vectorSumText" style="text-align:center; margin-top:8px; font-size:0.95em; color:#ddd;">
                동적 평형 상태 확인 중...
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width = canvas.offsetWidth;
        const height = canvas.height = canvas.offsetHeight;

        const TOTAL_PARTICLES = 150;
        let particles = [];
        let trackedIndex = -1;
        let temperature = 50;

        class Particle {
            constructor(id) {
                this.id = id;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.type = 'A';
                this.flashTimer = 0;
                this.setRandomVelocity();
            }

            setRandomVelocity() {
                const speed = (Math.random() * 2 + 1) * (temperature / 50) * 0.5;
                const angle = Math.random() * 2 * Math.PI;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
            }

            update(kf, kr) {
                this.x += this.vx * (temperature / 50);
                this.y += this.vy * (temperature / 50);

                if (this.x <= 0 || this.x >= width) this.vx *= -1;
                if (this.y <= 0 || this.y >= height) this.vy *= -1;

                let reacted = false;
                if (this.type === 'A' && Math.random() < kf) {
                    this.type = 'B';
                    reacted = true;
                } else if (this.type === 'B' && Math.random() < kr) {
                    this.type = 'A';
                    reacted = true;
                }

                if (reacted) {
                    this.flashTimer = 25; 
                    this.setRandomVelocity();
                }

                if (this.flashTimer > 0) this.flashTimer--;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = this.type === 'A' ? '#ff4757' : '#a4b0be';
                ctx.fill();

                if (this.flashTimer > 0) {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${this.flashTimer / 25})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }

                if (this.id === trackedIndex) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 12, 0, Math.PI * 2);
                    ctx.strokeStyle = '#ffcc00';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }
        }

        for (let i = 0; i < TOTAL_PARTICLES; i++) {
            particles.push(new Particle(i));
        }

        document.getElementById('trackBtn').addEventListener('click', function() {
            if (trackedIndex === -1) {
                trackedIndex = Math.floor(Math.random() * TOTAL_PARTICLES);
                this.innerText = '추적 끄기';
                this.classList.add('active');
            } else {
                trackedIndex = -1;
                this.innerText = '추적 켜기';
                this.classList.remove('active');
            }
        });

        document.getElementById('tempSlider').addEventListener('input', function() {
            temperature = parseInt(this.value);
            document.getElementById('tempValue').innerText = temperature;
        });

        function animate() {
            ctx.clearRect(0, 0, width, height);

            const kf = 0.001 * Math.pow(temperature / 50, 2); 
            const kr = 0.0025 * (temperature / 50);

            let countA = 0;
            let countB = 0;

            particles.forEach(p => {
                p.update(kf, kr);
                p.draw();
                if (p.type === 'A') countA++;
                else countB++;
            });

            document.getElementById('countATable').innerText = countA;
            document.getElementById('countBTable').innerText = countB;

            const concA = countA / TOTAL_PARTICLES; 
            const maxAbsorbance = 0.4; 
            const absorbance = maxAbsorbance * concA;
            const transmittance = Math.pow(10, -absorbance); 
            
            const rColor = 255;
            const gbColor = Math.round(255 * transmittance);
            document.getElementById('macroColorBox').style.backgroundColor = `rgb(${rColor}, ${gbColor}, ${gbColor})`;

            // 핵심 수정 포인트: 최대 온도(100도)에서의 동적 평형 속도값을 기준으로 스케일링
            // T=100일 때 평형 속도는 대략 0.333입니다. 이 값이 90%를 차지하도록 maxRate를 0.37로 대폭 낮췄습니다.
            const rateForward = countA * kf;
            const rateReverse = countB * kr;
            const maxRate = 0.37; 
            
            document.getElementById('vectorForward').style.width = Math.min((rateForward / maxRate) * 100, 100) + '%';
            document.getElementById('vectorReverse').style.width = Math.min((rateReverse / maxRate) * 100, 100) + '%';

            const netRate = rateForward - rateReverse;
            const sumBar = document.getElementById('vectorSumBar');
            const sumText = document.getElementById('vectorSumText');
            
            const widthPercent = Math.min((Math.abs(netRate) / maxRate) * 50, 50);

            if (netRate > 0.01) {
                sumBar.style.left = '50%';
                sumBar.style.width = widthPercent + '%';
                sumBar.style.backgroundColor = '#ff4757';
                sumBar.className = 'vector-sum-bar arrow-right';
                sumText.innerHTML = '순반응: <strong>정반응 (A → B)</strong> 우세';
            } else if (netRate < -0.01) {
                sumBar.style.left = (50 - widthPercent) + '%';
                sumBar.style.width = widthPercent + '%';
                sumBar.style.backgroundColor = '#a4b0be';
                sumBar.className = 'vector-sum-bar arrow-left';
                sumText.innerHTML = '순반응: <strong>역반응 (B → A)</strong> 우세';
            } else {
                sumBar.style.width = '0%';
                sumBar.className = 'vector-sum-bar';
                sumText.innerHTML = '순반응: 0 (<strong>완전한 동적 평형</strong>)';
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
